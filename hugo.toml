baseURL = 'https://example.org/'
languageCode = 'it'
title = 'segnali'
theme = 'hugo-book'

# Configurazioni di output
[outputs]
  home = ['HTML', 'RSS']

# Configurazioni specifiche del tema
[params]
  # Estetica minimalista
  BookTheme = 'light'
  BookToC = true
  BookComments = false
  BookSearch = true
  BookPortableLinks = true
  
  # Font personalizzato
  BookCustomCSS = ['fonts.css']
  
  # Colori e stile pulito
  BookMenuBundle = true

# Menu principale della sidebar
[[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  weight = 1
  url = '/docs/blog/'

[[menu.main]]
  identifier = 'archivio'
  name = 'Archivio'
  weight = 999
  url = '/archivio/'